name: Build Anon Client Package for Debian
description: Builds the Anon client package for Debian and uploads the executables as an artifact.
inputs:
  build-arch:
    required: true
    description: The architecture to build for (amd64 or arm64).
  release-phase:
    required: true
    description: The release phase (beta, live, stage, dev, or unstable-dev).
  debian-private-key:
    required: true
    description: The base64-encoded GPG private key to sign the Debian package with.
  debian-fingerprint:
    required: true
    description: The GPG fingerprint of the key to sign the Debian package with.
  os:
    required: true
    description: The operating system to build for (e.g. ubuntu-latest).
  suite:
    required: true
    description: The Debian suite to build for (e.g. bookworm).
runs:
  using: composite
  steps:
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: anon-${{ inputs.release-phase }}-source-packages
        path: source-packages/
    - name: Install Dependencies
      shell: bash
      run: |
        apt-get -y update
        apt-get -y dist-upgrade
        apt-get -y install build-essential devscripts gpg reprepro fakeroot
    - name: Build Package
      shell: bash
      run: |
        set -x
        find source-packages
        upstream_version="$(head -n1 source-packages/version.txt)"
        if [ -z "$upstream_version" ]; then echo >&2 "Did not get package version from artifact."; exit 1; fi
        echo $upstream_version

        srcchanges="$(ls -1 source-packages/anon_"$upstream_version"*${{ inputs.suite }}+*_src.changes)"
        echo "srcchanges: $srcchanges"
        if [ "$(echo "$srcchanges" | wc -l)" != 1 ] || [ -z "$srcchanges" ] ; then echo >&2 "Weird number of changes files found."; exit 1; fi

        case "${{ inputs.build-arch }}" in
          amd64) build_selector="-b";;
          *)     build_selector="-B";;
        esac

        echo "source changes file:"
        cat "$srcchanges"
        dsc="$(dcmd --dsc "$srcchanges")"
        echo "dsc file is ${dsc}"
        cat "$dsc"

        mkdir build-tree
        cd build-tree
        dpkg-source -x ../${dsc}
        cd anon-${upstream_version}
        apt-get -y build-dep .
        debuild -rfakeroot -uc -us -j4 "$build_selector"
        cd ..
        binchanges="$(ls -1 *.changes)"
        if [ "$(echo "$binchanges" | wc -l)" != 1 ] || [ -z "$binchanges" ] ; then echo >&2 "Weird number of changes files produced."; exit 1; fi
        cd ..

        mkdir RESULT
        dcmd ln -v "build-tree/${binchanges}" RESULT
        mv -v --no-target-directory RESULT binary-packages/
    - name: Sign Binary Package
      shell: bash
      run: |
        echo "${{ inputs.debian-private-key }}" | base64 -d > debian-private.gpg
        gpg --allow-secret-key-import --import debian-private.gpg
        debsign -k ${{ inputs.debian-fingerprint }} binary-packages/anon_*.changes
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: anon-${{ inputs.release-phase }}-${{ inputs.os }}-${{ inputs.suite }}-${{ inputs.build-arch }}
        path: binary-packages/